<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TermDash</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/home.css">
  <link rel="stylesheet" href="styles/tabs.css">
  <link rel="stylesheet" href="styles/terminal.css">
</head>
<body>
  <div id="root"></div>
  <div id="err-overlay" style="display:none;position:fixed;top:0;left:0;right:0;background:#8b0000;color:#fff;padding:12px 16px;font:13px monospace;z-index:9999;white-space:pre-wrap;max-height:200px;overflow:auto;"></div>
  <script>
    window.addEventListener('error', function(e) {
      if (e.message && e.message.includes('ResizeObserver')) { e.stopImmediatePropagation(); return false; }
      var el = document.getElementById('err-overlay');
      el.style.display = 'block';
      el.textContent = (e.error ? e.error.stack : e.message) + '\n@ ' + e.filename + ':' + e.lineno;
    }, true);
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('err-overlay');
      el.style.display = 'block';
      el.textContent = 'Unhandled Promise: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
    });
  </script>

  <!-- All local — no CDN, works offline -->
  <script src="../node_modules/react/umd/react.production.min.js"></script>
  <script src="../node_modules/react-dom/umd/react-dom.production.min.js"></script>
  <script src="../node_modules/@babel/standalone/babel.min.js"></script>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>

  <script type="text/babel" src="hooks/useSessions.js"></script>
  <script type="text/babel" src="components/TerminalView.jsx"></script>
  <script type="text/babel" src="components/SessionTile.jsx"></script>
  <script type="text/babel" src="components/HomeGrid.jsx"></script>
  <script type="text/babel" src="components/TabBar.jsx"></script>
  <script type="text/babel" src="components/NewSessionModal.jsx"></script>
  <script type="text/babel" src="components/GitSkillsPanel.jsx"></script>
  <script type="text/babel" src="components/SkillsPanel.jsx"></script>
  <script type="text/babel" src="components/CommanderPanel.jsx"></script>
  <script type="text/babel" src="components/AIGoalModal.jsx"></script>
  <script type="text/babel" src="components/SetupStatus.jsx"></script>
  <script type="text/babel" src="components/SwarmPanel.jsx"></script>
  <script type="text/babel" src="components/RoadmapPanel.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel" src="index.jsx"></script>
</body>
</html>
